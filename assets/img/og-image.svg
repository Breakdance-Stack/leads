<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="50%" style="stop-color:#1e293b"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#818cf8"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#818cf8;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b"/>
      <stop offset="100%" style="stop-color:#162032"/>
    </linearGradient>
    <filter id="shadow1" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="20" flood-color="#3b82f6" flood-opacity="0.25"/>
    </filter>
    <filter id="shadow2" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <filter id="glowFilter">
      <feGaussianBlur stdDeviation="40" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="roundCard1"><rect x="700" y="120" width="200" height="160" rx="16"/></clipPath>
    <clipPath id="roundCard2"><rect x="920" y="120" width="200" height="160" rx="16"/></clipPath>
    <clipPath id="roundCard3"><rect x="700" y="300" width="200" height="160" rx="16"/></clipPath>
    <clipPath id="roundCard4"><rect x="920" y="300" width="200" height="160" rx="16"/></clipPath>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
    <path d="M 60 0 L 0 0 0 60" fill="none" stroke="rgba(255,255,255,0.02)" stroke-width="1"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Decorative glow orbs -->
  <circle cx="350" cy="315" r="280" fill="url(#glow)" filter="url(#glowFilter)" opacity="0.5"/>
  <circle cx="900" cy="200" r="200" fill="url(#glow)" filter="url(#glowFilter)" opacity="0.3"/>

  <!-- Top accent line -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent)"/>

  <!-- Left side content -->
  <!-- Logo -->
  <text x="80" y="100" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="700" fill="#f1f5f9">SEO <tspan fill="#3b82f6">Masterplan</tspan></text>

  <!-- Rocket icon box -->
  <rect x="80" y="150" width="64" height="64" rx="18" fill="url(#accent)" filter="url(#shadow2)"/>
  <text x="112" y="195" font-size="34" text-anchor="middle" dominant-baseline="middle">🚀</text>

  <!-- Main headline -->
  <text x="80" y="270" font-family="system-ui, -apple-system, sans-serif" font-size="48" font-weight="800" fill="#f1f5f9" letter-spacing="-1">Finde deine</text>
  <text x="80" y="330" font-family="system-ui, -apple-system, sans-serif" font-size="48" font-weight="800" fill="url(#accent)" letter-spacing="-1">perfekte Leadquelle</text>

  <!-- Subtitle -->
  <text x="80" y="380" font-family="system-ui, -apple-system, sans-serif" font-size="20" fill="#94a3b8">11 Fragen · 2 Minuten · 100% kostenlos</text>

  <!-- Badges row -->
  <!-- Badge 1: Languages -->
  <rect x="80" y="420" width="160" height="42" rx="21" fill="rgba(59,130,246,0.12)" stroke="rgba(59,130,246,0.25)" stroke-width="1.5"/>
  <text x="106" y="447" font-size="18">🌍</text>
  <text x="130" y="447" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#3b82f6">20 Sprachen</text>

  <!-- Badge 2: Protected -->
  <rect x="256" y="420" width="170" height="42" rx="21" fill="rgba(59,130,246,0.12)" stroke="rgba(59,130,246,0.25)" stroke-width="1.5"/>
  <text x="282" y="447" font-size="18">🔒</text>
  <text x="306" y="447" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#3b82f6">Daten geschützt</text>

  <!-- Badge 3: Qualified -->
  <rect x="442" y="420" width="200" height="42" rx="21" fill="rgba(34,197,94,0.12)" stroke="rgba(34,197,94,0.25)" stroke-width="1.5"/>
  <text x="468" y="447" font-size="18">✅</text>
  <text x="492" y="447" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#22c55e">Qualifizierte Leads</text>

  <!-- CTA bar at bottom -->
  <rect x="80" y="500" width="260" height="54" rx="14" fill="url(#accent)" filter="url(#shadow1)"/>
  <text x="210" y="534" font-family="system-ui, sans-serif" font-size="17" font-weight="700" fill="#fff" text-anchor="middle">Quiz jetzt starten →</text>

  <!-- Right side: Quiz preview cards -->
  <!-- Card 1 -->
  <rect x="700" y="120" width="200" height="160" rx="16" fill="url(#cardGrad)" stroke="rgba(255,255,255,0.08)" stroke-width="1.5" filter="url(#shadow2)"/>
  <rect x="700" y="120" width="200" height="80" rx="16" fill="rgba(51,65,85,0.6)"/>
  <rect x="700" y="175" width="200" height="25" fill="rgba(51,65,85,0.6)"/>
  <text x="800" y="168" font-size="36" text-anchor="middle">🏢</text>
  <rect x="716" y="216" width="22" height="22" rx="5" fill="none" stroke="rgba(59,130,246,0.5)" stroke-width="1.5"/>
  <text x="727" y="233" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#3b82f6" text-anchor="middle">A</text>
  <text x="748" y="233" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#e2e8f0">Agentur</text>
  <rect x="716" y="248" width="22" height="22" rx="5" fill="#3b82f6"/>
  <text x="727" y="265" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#fff" text-anchor="middle">B</text>
  <text x="748" y="265" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#e2e8f0">Coach</text>

  <!-- Card 2 -->
  <rect x="920" y="120" width="200" height="160" rx="16" fill="url(#cardGrad)" stroke="rgba(59,130,246,0.3)" stroke-width="1.5" filter="url(#shadow2)"/>
  <rect x="920" y="120" width="200" height="80" rx="16" fill="rgba(51,65,85,0.6)"/>
  <rect x="920" y="175" width="200" height="25" fill="rgba(51,65,85,0.6)"/>
  <text x="1020" y="168" font-size="36" text-anchor="middle">💸</text>
  <rect x="936" y="216" width="22" height="22" rx="5" fill="#3b82f6"/>
  <text x="947" y="233" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#fff" text-anchor="middle">A</text>
  <text x="968" y="233" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#e2e8f0">Zu teuer</text>
  <rect x="936" y="248" width="22" height="22" rx="5" fill="none" stroke="rgba(59,130,246,0.5)" stroke-width="1.5"/>
  <text x="947" y="265" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#3b82f6" text-anchor="middle">B</text>
  <text x="968" y="265" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#e2e8f0">Zu wenig</text>

  <!-- Card 3 -->
  <rect x="700" y="300" width="200" height="160" rx="16" fill="url(#cardGrad)" stroke="rgba(255,255,255,0.08)" stroke-width="1.5" filter="url(#shadow2)"/>
  <rect x="700" y="300" width="200" height="80" rx="16" fill="rgba(51,65,85,0.6)"/>
  <rect x="700" y="355" width="200" height="25" fill="rgba(51,65,85,0.6)"/>
  <text x="800" y="348" font-size="36" text-anchor="middle">🇩🇪</text>
  <rect x="716" y="396" width="22" height="22" rx="5" fill="none" stroke="rgba(59,130,246,0.5)" stroke-width="1.5"/>
  <text x="727" y="413" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#3b82f6" text-anchor="middle">A</text>
  <text x="748" y="413" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#e2e8f0">Regional</text>
  <rect x="716" y="428" width="22" height="22" rx="5" fill="#3b82f6"/>
  <text x="727" y="445" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#fff" text-anchor="middle">B</text>
  <text x="748" y="445" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#e2e8f0">Deutschland</text>

  <!-- Card 4 -->
  <rect x="920" y="300" width="200" height="160" rx="16" fill="url(#cardGrad)" stroke="rgba(255,255,255,0.08)" stroke-width="1.5" filter="url(#shadow2)"/>
  <rect x="920" y="300" width="200" height="80" rx="16" fill="rgba(51,65,85,0.6)"/>
  <rect x="920" y="355" width="200" height="25" fill="rgba(51,65,85,0.6)"/>
  <text x="1020" y="348" font-size="36" text-anchor="middle">🚀</text>
  <rect x="936" y="396" width="22" height="22" rx="5" fill="#3b82f6"/>
  <text x="947" y="413" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#fff" text-anchor="middle">A</text>
  <text x="968" y="413" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#e2e8f0">5 – 10</text>
  <rect x="936" y="428" width="22" height="22" rx="5" fill="none" stroke="rgba(59,130,246,0.5)" stroke-width="1.5"/>
  <text x="947" y="445" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#3b82f6" text-anchor="middle">B</text>
  <text x="968" y="445" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#e2e8f0">10 – 20</text>

  <!-- Progress bar preview on cards -->
  <rect x="700" y="488" width="420" height="6" rx="3" fill="rgba(255,255,255,0.06)"/>
  <rect x="700" y="488" width="260" height="6" rx="3" fill="url(#accent)"/>
  <text x="910" y="524" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#64748b" text-anchor="middle">7 / 11</text>

  <!-- Bottom border accent -->
  <rect x="0" y="626" width="1200" height="4" fill="url(#accent)"/>
</svg>

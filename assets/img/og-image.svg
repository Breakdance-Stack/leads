<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="50%" style="stop-color:#1e293b"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#818cf8"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#818cf8;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b"/>
      <stop offset="100%" style="stop-color:#162032"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Grid pattern -->
  <g opacity="0.03">
    <line x1="0" y1="60" x2="1200" y2="60" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="120" x2="1200" y2="120" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="180" x2="1200" y2="180" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="240" x2="1200" y2="240" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="300" x2="1200" y2="300" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="360" x2="1200" y2="360" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="420" x2="1200" y2="420" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="480" x2="1200" y2="480" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="540" x2="1200" y2="540" stroke="#fff" stroke-width="1"/>
    <line x1="60" y1="0" x2="60" y2="630" stroke="#fff" stroke-width="1"/>
    <line x1="120" y1="0" x2="120" y2="630" stroke="#fff" stroke-width="1"/>
    <line x1="180" y1="0" x2="180" y2="630" stroke="#fff" stroke-width="1"/>
    <line x1="240" y1="0" x2="240" y2="630" stroke="#fff" stroke-width="1"/>
    <line x1="300" y1="0" x2="300" y2="630" stroke="#fff" stroke-width="1"/>
  </g>

  <!-- Glow orbs -->
  <circle cx="300" cy="300" r="250" fill="url(#glow)"/>
  <circle cx="900" cy="200" r="200" fill="url(#glow)" opacity="0.5"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent)"/>

  <!-- Logo area -->
  <text x="80" y="90" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700" fill="#94a3b8">SEO</text>
  <text x="130" y="90" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700" fill="#3b82f6">Masterplan</text>

  <!-- Rocket icon -->
  <rect x="80" y="130" width="60" height="60" rx="16" fill="url(#accent)"/>
  <text x="110" y="170" font-size="30" text-anchor="middle" dominant-baseline="central" font-family="Arial">&#x1F680;</text>

  <!-- Headline line 1 -->
  <text x="80" y="260" font-family="Arial, Helvetica, sans-serif" font-size="52" font-weight="800" fill="#f1f5f9">Finde deine</text>

  <!-- Headline line 2 (gradient simulated with blue) -->
  <text x="80" y="325" font-family="Arial, Helvetica, sans-serif" font-size="52" font-weight="800" fill="#3b82f6">perfekte Leadquelle</text>

  <!-- Subtitle -->
  <text x="80" y="380" font-family="Arial, Helvetica, sans-serif" font-size="20" fill="#94a3b8">11 Fragen  ·  2 Minuten  ·  100% kostenlos</text>

  <!-- Badges -->
  <rect x="80" y="420" width="150" height="40" rx="20" fill="none" stroke="#3b82f6" stroke-opacity="0.4" stroke-width="1.5"/>
  <text x="105" y="446" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="#3b82f6">&#x1F30D;  20 Sprachen</text>

  <rect x="248" y="420" width="170" height="40" rx="20" fill="none" stroke="#3b82f6" stroke-opacity="0.4" stroke-width="1.5"/>
  <text x="273" y="446" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="#3b82f6">&#x1F512;  Daten geschützt</text>

  <rect x="436" y="420" width="195" height="40" rx="20" fill="none" stroke="#22c55e" stroke-opacity="0.4" stroke-width="1.5"/>
  <text x="461" y="446" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="#22c55e">&#x2705;  Qualifizierte Leads</text>

  <!-- CTA Button -->
  <rect x="80" y="500" width="260" height="56" rx="14" fill="url(#accent)"/>
  <text x="210" y="535" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#ffffff" text-anchor="middle">Quiz jetzt starten  &#x2192;</text>

  <!-- RIGHT SIDE: Quiz preview cards -->

  <!-- Card 1: Bereich -->
  <rect x="700" y="80" width="210" height="170" rx="14" fill="#1e293b" stroke="rgba(255,255,255,0.08)" stroke-width="1.5"/>
  <rect x="700" y="80" width="210" height="75" rx="14" fill="#283548"/>
  <rect x="700" y="141" width="210" height="14" fill="#283548"/>
  <text x="805" y="130" font-size="32" text-anchor="middle" font-family="Arial">&#x1F3E2;</text>
  <rect x="716" y="172" width="22" height="22" rx="5" fill="none" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="727" y="188" font-family="Arial, sans-serif" font-size="10" font-weight="700" fill="#3b82f6" text-anchor="middle">A</text>
  <text x="748" y="188" font-family="Arial, sans-serif" font-size="13" font-weight="600" fill="#e2e8f0">Agentur</text>
  <rect x="716" y="202" width="22" height="22" rx="5" fill="#3b82f6"/>
  <text x="727" y="218" font-family="Arial, sans-serif" font-size="10" font-weight="700" fill="#ffffff" text-anchor="middle">B</text>
  <text x="748" y="218" font-family="Arial, sans-serif" font-size="13" font-weight="600" fill="#e2e8f0">Coach</text>

  <!-- Card 2: Herausforderungen -->
  <rect x="930" y="80" width="210" height="170" rx="14" fill="#1e293b" stroke="#3b82f6" stroke-opacity="0.3" stroke-width="1.5"/>
  <rect x="930" y="80" width="210" height="75" rx="14" fill="#283548"/>
  <rect x="930" y="141" width="210" height="14" fill="#283548"/>
  <text x="1035" y="130" font-size="32" text-anchor="middle" font-family="Arial">&#x1F4B8;</text>
  <rect x="946" y="172" width="22" height="22" rx="5" fill="#3b82f6"/>
  <text x="957" y="188" font-family="Arial, sans-serif" font-size="10" font-weight="700" fill="#ffffff" text-anchor="middle">A</text>
  <text x="978" y="188" font-family="Arial, sans-serif" font-size="13" font-weight="600" fill="#e2e8f0">Zu teuer</text>
  <rect x="946" y="202" width="22" height="22" rx="5" fill="none" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="957" y="218" font-family="Arial, sans-serif" font-size="10" font-weight="700" fill="#3b82f6" text-anchor="middle">B</text>
  <text x="978" y="218" font-family="Arial, sans-serif" font-size="13" font-weight="600" fill="#e2e8f0">Zu wenig</text>

  <!-- Card 3: Region -->
  <rect x="700" y="270" width="210" height="170" rx="14" fill="#1e293b" stroke="rgba(255,255,255,0.08)" stroke-width="1.5"/>
  <rect x="700" y="270" width="210" height="75" rx="14" fill="#283548"/>
  <rect x="700" y="331" width="210" height="14" fill="#283548"/>
  <text x="805" y="320" font-size="32" text-anchor="middle" font-family="Arial">&#x1F1E9;&#x1F1EA;</text>
  <rect x="716" y="362" width="22" height="22" rx="5" fill="none" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="727" y="378" font-family="Arial, sans-serif" font-size="10" font-weight="700" fill="#3b82f6" text-anchor="middle">A</text>
  <text x="748" y="378" font-family="Arial, sans-serif" font-size="13" font-weight="600" fill="#e2e8f0">Regional</text>
  <rect x="716" y="392" width="22" height="22" rx="5" fill="#3b82f6"/>
  <text x="727" y="408" font-family="Arial, sans-serif" font-size="10" font-weight="700" fill="#ffffff" text-anchor="middle">B</text>
  <text x="748" y="408" font-family="Arial, sans-serif" font-size="13" font-weight="600" fill="#e2e8f0">Deutschland</text>

  <!-- Card 4: Anfragen -->
  <rect x="930" y="270" width="210" height="170" rx="14" fill="#1e293b" stroke="rgba(255,255,255,0.08)" stroke-width="1.5"/>
  <rect x="930" y="270" width="210" height="75" rx="14" fill="#283548"/>
  <rect x="930" y="331" width="210" height="14" fill="#283548"/>
  <text x="1035" y="320" font-size="32" text-anchor="middle" font-family="Arial">&#x1F680;</text>
  <rect x="946" y="362" width="22" height="22" rx="5" fill="#3b82f6"/>
  <text x="957" y="378" font-family="Arial, sans-serif" font-size="10" font-weight="700" fill="#ffffff" text-anchor="middle">A</text>
  <text x="978" y="378" font-family="Arial, sans-serif" font-size="13" font-weight="600" fill="#e2e8f0">5 – 10</text>
  <rect x="946" y="392" width="22" height="22" rx="5" fill="none" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="957" y="408" font-family="Arial, sans-serif" font-size="10" font-weight="700" fill="#3b82f6" text-anchor="middle">B</text>
  <text x="978" y="408" font-family="Arial, sans-serif" font-size="13" font-weight="600" fill="#e2e8f0">10 – 20</text>

  <!-- Progress bar -->
  <rect x="700" y="468" width="440" height="6" rx="3" fill="#283548"/>
  <rect x="700" y="468" width="280" height="6" rx="3" fill="url(#accent)"/>
  <text x="920" y="500" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="#64748b" text-anchor="middle">7 / 11</text>

  <!-- Bottom accent bar -->
  <rect x="0" y="626" width="1200" height="4" fill="url(#accent)"/>
</svg>

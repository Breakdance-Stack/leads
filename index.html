  <style>
    :root {
      --bg: #0f172a;
      --bg-card: #1e293b;
      --bg-hover: #334155;
      --bg-selected: #1d4ed8;
      --text: #f1f5f9;
      --text-muted: #94a3b8;
      --text-dim: #64748b;
      --accent: #3b82f6;
      --accent-hover: #2563eb;
      --accent-glow: rgba(59, 130, 246, 0.3);
      --green: #22c55e;
      --green-glow: rgba(34, 197, 94, 0.3);
      --orange: #f59e0b;
      --radius: 16px;
      --radius-sm: 12px;
      --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { overflow-x: hidden; }
    body {
      font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      min-height: 100dvh;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }
    .quiz-wrapper {
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    /* HEADER */
    .quiz-header {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      background: rgba(15, 23, 42, 0.95);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .header-inner {
      max-width: 800px; margin: 0 auto;
      padding: 16px 24px 12px;
      display: flex; align-items: center; justify-content: space-between; gap: 12px;
    }
    .logo { font-size: 18px; font-weight: 700; letter-spacing: -0.02em; white-space: nowrap; }
    .logo span { color: var(--accent); }
    .header-right { display: flex; align-items: center; gap: 14px; }
    .step-counter { font-size: 14px; color: var(--text-muted); font-weight: 500; white-space: nowrap; }
    .progress-bar { height: 3px; background: rgba(255,255,255,0.06); }
    .progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), #818cf8); border-radius: 0 3px 3px 0; transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1); width: 0%; }

    /* LANGUAGE PICKER */
    .lang-picker { position: relative; }
    .lang-btn {
      display: flex; align-items: center; gap: 6px;
      background: var(--bg-card); border: 1.5px solid rgba(255,255,255,0.1);
      border-radius: 10px; padding: 7px 12px; cursor: pointer;
      color: var(--text); font-size: 13px; font-weight: 600; font-family: inherit;
      transition: var(--transition);
    }
    .lang-btn:hover { border-color: var(--accent); }
    .lang-btn .flag { font-size: 16px; }
    .lang-btn svg { width: 12px; height: 12px; color: var(--text-muted); transition: var(--transition); }
    .lang-picker.open .lang-btn svg { transform: rotate(180deg); }
    .lang-dropdown {
      display: none; position: absolute; top: calc(100% + 6px); right: 0;
      background: var(--bg-card); border: 1px solid rgba(255,255,255,0.1);
      border-radius: var(--radius-sm); padding: 6px;
      min-width: 200px; max-height: 360px; overflow-y: auto;
      box-shadow: 0 12px 40px rgba(0,0,0,0.5); z-index: 200;
    }
    .lang-picker.open .lang-dropdown { display: block; }
    .lang-option {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 12px; border-radius: 8px; cursor: pointer;
      font-size: 13px; font-weight: 500; color: var(--text-muted);
      transition: var(--transition); border: none; background: none;
      width: 100%; text-align: left; font-family: inherit;
    }
    .lang-option:hover { background: var(--bg-hover); color: var(--text); }
    .lang-option.active { background: rgba(59,130,246,0.15); color: var(--accent); }
    .lang-option .flag { font-size: 18px; }
    .lang-dropdown::-webkit-scrollbar { width: 6px; }
    .lang-dropdown::-webkit-scrollbar-track { background: transparent; }
    .lang-dropdown::-webkit-scrollbar-thumb { background: var(--bg-hover); border-radius: 3px; }

    /* SLIDES */
    .quiz-body {
      flex: 1; display: flex; align-items: center; justify-content: center;
      padding: 100px 24px 100px;
    }
    .slide { display: none; width: 100%; max-width: 720px; animation: slideIn 0.4s ease; }
    .slide.active { display: block; }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .question-number {
      display: inline-flex; align-items: center; justify-content: center;
      width: 32px; height: 32px; background: var(--accent); color: #fff;
      border-radius: 8px; font-size: 14px; font-weight: 700; margin-bottom: 16px;
    }
    .question-text {
      font-size: clamp(22px, 4vw, 32px); font-weight: 700; line-height: 1.3;
      margin-bottom: 8px; letter-spacing: -0.02em;
    }
    .question-sub { font-size: 15px; color: var(--text-muted); margin-bottom: 32px; }

    /* OPTION CARDS */
    .options-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 14px; }
    .options-grid.two-col { grid-template-columns: repeat(2, 1fr); }
    .options-grid.three-col { grid-template-columns: repeat(3, 1fr); }
    .option-card {
      position: relative; background: var(--bg-card);
      border: 2px solid rgba(255,255,255,0.06); border-radius: var(--radius);
      cursor: pointer; transition: var(--transition); overflow: hidden;
    }
    .option-card:hover {
      border-color: var(--accent); transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(59,130,246,0.15);
    }
    .option-card.selected {
      border-color: var(--accent); background: rgba(59, 130, 246, 0.1);
      box-shadow: 0 0 0 1px var(--accent), 0 8px 32px rgba(59,130,246,0.2);
    }
    .option-img-placeholder {
      width: 100%; height: 120px; display: flex; align-items: center; justify-content: center;
      font-size: 48px; background: linear-gradient(135deg, var(--bg-hover), var(--bg-card));
    }
    .option-body { padding: 14px 16px; display: flex; align-items: center; gap: 12px; }
    .option-key {
      display: inline-flex; align-items: center; justify-content: center;
      min-width: 28px; height: 28px; border: 1.5px solid var(--text-dim);
      border-radius: 6px; font-size: 12px; font-weight: 700;
      color: var(--text-muted); transition: var(--transition); flex-shrink: 0;
    }
    .option-card.selected .option-key { background: var(--accent); border-color: var(--accent); color: #fff; }
    .option-card:hover .option-key { border-color: var(--accent); color: var(--accent); }
    .option-card.selected:hover .option-key { color: #fff; }
    .option-label { font-size: 15px; font-weight: 600; }

    .multi-hint {
      display: inline-flex; align-items: center; gap: 6px;
      background: rgba(59, 130, 246, 0.1); color: var(--accent);
      padding: 6px 14px; border-radius: 20px; font-size: 13px; font-weight: 500; margin-bottom: 24px;
    }

    /* INPUT */
    .input-group { margin-bottom: 20px; }
    .input-group label { display: block; font-size: 14px; font-weight: 600; color: var(--text-muted); margin-bottom: 8px; }
    .input-field {
      width: 100%; padding: 16px 20px; background: var(--bg-card);
      border: 2px solid rgba(255,255,255,0.08); border-radius: var(--radius-sm);
      color: var(--text); font-size: 16px; font-family: inherit;
      transition: var(--transition); outline: none;
    }
    .input-field:focus { border-color: var(--accent); box-shadow: 0 0 0 4px var(--accent-glow); }
    .input-field::placeholder { color: var(--text-dim); }
    textarea.input-field { min-height: 120px; resize: vertical; }
    .input-error { color: #ef4444; font-size: 13px; margin-top: 6px; display: none; }
    .input-error.show { display: block; }

    /* NAV */
    .nav-row { display: flex; align-items: center; justify-content: space-between; margin-top: 32px; gap: 12px; }
    .btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 14px 28px; border-radius: var(--radius-sm);
      font-size: 15px; font-weight: 600; font-family: inherit;
      cursor: pointer; transition: var(--transition); border: none; outline: none;
    }
    .btn-primary { background: var(--accent); color: #fff; box-shadow: 0 4px 16px var(--accent-glow); }
    .btn-primary:hover { background: var(--accent-hover); transform: translateY(-1px); box-shadow: 0 8px 24px var(--accent-glow); }
    .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
    .btn-back { background: transparent; color: var(--text-muted); border: 1.5px solid rgba(255,255,255,0.1); }
    .btn-back:hover { color: var(--text); border-color: rgba(255,255,255,0.2); }
    .btn-submit { background: var(--green); color: #fff; box-shadow: 0 4px 16px var(--green-glow); padding: 16px 36px; font-size: 16px; }
    .btn-submit:hover { background: #16a34a; transform: translateY(-1px); box-shadow: 0 8px 24px var(--green-glow); }
    .btn-submit:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
    .btn svg { width: 18px; height: 18px; }

    /* INTRO */
    .intro-screen { text-align: center; max-width: 600px; }
    .intro-icon {
      width: 80px; height: 80px; margin: 0 auto 24px;
      background: linear-gradient(135deg, var(--accent), #818cf8);
      border-radius: 24px; display: flex; align-items: center; justify-content: center; font-size: 40px;
    }
    .intro-screen h1 {
      font-size: clamp(28px, 5vw, 42px); font-weight: 800; line-height: 1.2;
      margin-bottom: 16px; letter-spacing: -0.03em;
    }
    .intro-screen h1 span {
      background: linear-gradient(135deg, var(--accent), #818cf8);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .intro-screen p { font-size: 17px; color: var(--text-muted); margin-bottom: 32px; line-height: 1.7; }
    .intro-badges { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-bottom: 36px; }
    .intro-badge {
      display: inline-flex; align-items: center; gap: 6px;
      background: rgba(59, 130, 246, 0.1); border: 1px solid rgba(59, 130, 246, 0.2);
      color: var(--accent); padding: 8px 16px; border-radius: 24px; font-size: 13px; font-weight: 500;
    }
    .btn-start { padding: 18px 48px; font-size: 17px; border-radius: 14px; }

    /* RESULT */
    .result-screen { text-align: center; max-width: 640px; }
    .result-check {
      width: 80px; height: 80px; margin: 0 auto 24px;
      background: linear-gradient(135deg, var(--green), #4ade80);
      border-radius: 50%; display: flex; align-items: center; justify-content: center;
      animation: scaleIn 0.5s ease;
    }
    @keyframes scaleIn { from { transform: scale(0); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    .result-check svg { width: 40px; height: 40px; color: #fff; }
    .result-screen h2 { font-size: clamp(24px, 4vw, 36px); font-weight: 800; margin-bottom: 12px; letter-spacing: -0.02em; }
    .result-screen .result-sub { font-size: 17px; color: var(--text-muted); margin-bottom: 36px; line-height: 1.7; }
    .result-cta {
      background: linear-gradient(135deg, rgba(59,130,246,0.1), rgba(129,140,248,0.1));
      border: 1px solid rgba(59,130,246,0.2); border-radius: var(--radius); padding: 28px; margin-bottom: 40px;
    }
    .result-cta p { font-size: 18px; font-weight: 600; margin-bottom: 4px; }
    .result-cta .sub { font-size: 14px; color: var(--text-muted); font-weight: 400; }
    .testimonials-heading {
      font-size: 14px; font-weight: 600; color: var(--text-dim);
      text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 24px;
    }
    .testimonials { display: grid; grid-template-columns: 1fr; gap: 16px; text-align: left; }
    .testimonial { background: var(--bg-card); border: 1px solid rgba(255,255,255,0.06); border-radius: var(--radius-sm); padding: 20px; }
    .testimonial-stars { color: var(--orange); font-size: 14px; margin-bottom: 8px; letter-spacing: 2px; }
    .testimonial-text { font-size: 14px; color: var(--text-muted); line-height: 1.6; margin-bottom: 12px; }
    .testimonial-author { font-size: 13px; font-weight: 600; }
    .testimonial-role { font-size: 12px; color: var(--text-dim); }

    .spinner {
      width: 20px; height: 20px; border: 2.5px solid rgba(255,255,255,0.3);
      border-top-color: #fff; border-radius: 50%; animation: spin 0.6s linear infinite; display: inline-block;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 640px) {
      .options-grid, .options-grid.two-col, .options-grid.three-col { grid-template-columns: 1fr; }
      .option-img-placeholder { height: 80px; }
      .quiz-body { padding: 90px 16px 80px; align-items: flex-start; }
      .nav-row {
        position: fixed; bottom: 0; left: 0; right: 0;
        background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px); padding: 12px 16px; margin: 0;
        border-top: 1px solid rgba(255,255,255,0.06); z-index: 100;
      }
      .btn { padding: 12px 20px; font-size: 14px; }
      .btn-start { padding: 16px 36px; }
      .header-inner { padding: 12px 16px 10px; }
      .lang-btn span.lang-label { display: none; }
      .testimonials { grid-template-columns: 1fr; }
    }
    @media (min-width: 641px) {
      .testimonials { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>

<div class="quiz-wrapper">
  <header class="quiz-header">
    <div class="header-inner">

          <button class="lang-btn" onclick="toggleLangMenu()" aria-label="Language">
            <span class="flag" id="langFlag"></span>
            <span class="lang-label" id="langLabel"></span>
            <svg fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M6 9l6 6 6-6"/></svg>
          </button>
          <div class="lang-dropdown" id="langDropdown"></div>
        </div>
      </div>
    </div>

      <div class="progress-fill" id="progressFill"></div>

  <main class="quiz-body">
    <!-- All slides rendered by JS -->
    <div id="quizContainer"></div>
  </main>
</div>

<script src="assets/js/translations.js"></script>
<script>
(function() {
  'use strict';

  var TOTAL = 11;
  var currentSlide = 0;
  var currentLang = localStorage.getItem('quiz_lang') || 'de';
  var answers = {};
  var container = document.getElementById('quizContainer');

  // SVG icons
  var ICON_ARROW_R = '<svg fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M13 7l5 5-5 5M6 12h12"/></svg>';
  var ICON_ARROW_L = '<svg fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M11 17l-5-5 5-5M18 12H6"/></svg>';
  var ICON_CHECK = '<svg fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>';
  var ICON_INFO = '<svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M13 16h-1v-4h-1m1-4h.01M12 2a10 10 0 100 20 10 10 0 000-20z"/></svg>';

  function t(key) {
    var entry = T[key];
    if (!entry) return key;
    return entry[currentLang] || entry['de'] || key;
  }

  // ============ LANGUAGE PICKER ============
  function buildLangDropdown() {
    var dd = document.getElementById('langDropdown');
    dd.innerHTML = '';
    LANGS.forEach(function(l) {
      var btn = document.createElement('button');
      btn.className = 'lang-option' + (l.code === currentLang ? ' active' : '');
      btn.innerHTML = '<span class="flag">' + l.flag + '</span> ' + l.label;
      btn.onclick = function(e) {
        e.stopPropagation();
        setLang(l.code);
      };
      dd.appendChild(btn);
    });
    // Update button
    var cur = LANGS.find(function(l) { return l.code === currentLang; }) || LANGS[0];
    document.getElementById('langFlag').textContent = cur.flag;
    document.getElementById('langLabel').textContent = cur.label;
  }

  window.toggleLangMenu = function() {
    document.getElementById('langPicker').classList.toggle('open');
  };

  document.addEventListener('click', function(e) {
    var picker = document.getElementById('langPicker');
    if (!picker.contains(e.target)) picker.classList.remove('open');
  });

  function setLang(code) {
    currentLang = code;
    localStorage.setItem('quiz_lang', code);
    document.documentElement.lang = code;
    // Set RTL for Arabic
    document.documentElement.dir = (code === 'ar') ? 'rtl' : 'ltr';
    document.getElementById('langPicker').classList.remove('open');
    buildLangDropdown();
    renderCurrentSlide();
    updateProgress();
  }

  // ============ QUIZ QUESTIONS DATA ============
  var questions = [
    { // Q1
      num: 1, type: 'single', name: 'bereich', cols: 'three-col',
      title: 'q1_title', sub: 'q1_sub',
      options: [
        { key: 'A', label: 'q1_a', emoji: '🏢', value: 'q1_a' },
        { key: 'B', label: 'q1_b', emoji: '🎓', value: 'q1_b' },
        { key: 'C', label: 'q1_c', emoji: '💡', value: 'q1_c' },
        { key: 'D', label: 'q1_d', emoji: '🏭', value: 'q1_d' },
        { key: 'E', label: 'q1_e', emoji: '💼', value: 'q1_e' },
        { key: 'F', label: 'q1_f', emoji: '🏗️', value: 'q1_f' }
      ]
    },
    { // Q2
      num: 2, type: 'multi', name: 'herausforderungen', cols: 'two-col',
      title: 'q2_title',
      options: [
        { key: 'A', label: 'q2_a', emoji: '📉', value: 'q2_a' },
        { key: 'B', label: 'q2_b', emoji: '💸', value: 'q2_b' },
        { key: 'C', label: 'q2_c', emoji: '📉', value: 'q2_c' },
        { key: 'D', label: 'q2_d', emoji: '⏳', value: 'q2_d' },
        { key: 'E', label: 'q2_e', emoji: '😔', value: 'q2_e' },
        { key: 'F', label: 'q2_f', emoji: '👎', value: 'q2_f' },
        { key: 'G', label: 'q2_g', emoji: '🚫', value: 'q2_g' }
      ]
    },
    { // Q3
      num: 3, type: 'single', name: 'anfragen_monat', cols: 'three-col',
      title: 'q3_title', sub: 'q3_sub',
      options: [
        { key: 'A', label: null, text: '1 – 5', emoji: '☝️', value: '1-5' },
        { key: 'B', label: null, text: '5 – 10', emoji: '✋', value: '5-10' },
        { key: 'C', label: null, text: '10 – 50', emoji: '📊', value: '10-50' },
        { key: 'D', label: null, text: '50 – 100', emoji: '📈', value: '50-100' },
        { key: 'E', label: 'over_100', emoji: '🔥', value: 'Über 100' }
      ]
    },
    { // Q4
      num: 4, type: 'single', name: 'angebotspreis', cols: 'three-col',
      title: 'q4_title', sub: 'q4_sub',
      options: [
        { key: 'A', label: 'q4_a', emoji: '💵', value: 'q4_a' },
        { key: 'B', label: 'q4_b', emoji: '💰', value: 'q4_b' },
        { key: 'C', label: 'q4_c', emoji: '💰', value: 'q4_c' },
        { key: 'D', label: 'q4_d', emoji: '💎', value: 'q4_d' },
        { key: 'E', label: 'q4_e', emoji: '💎', value: 'q4_e' },

      ]
    },

      options: [

        { key: 'B', label: null, text: '5 – 10', emoji: '👥', value: '5-10' },
        { key: 'C', label: null, text: '10 – 50', emoji: '👫', value: '10-50' },
        { key: 'D', label: null, text: '50 – 100', emoji: '👪', value: '50-100' },
        { key: 'E', label: 'over_100', emoji: '🏆', value: 'Über 100' }
      ]
    },
    { // Q6
      num: 6, type: 'multi', name: 'leadquellen', cols: 'three-col',
      title: 'q6_title',
      options: [
        { key: 'A', label: 'q6_a', emoji: '📱', value: 'q6_a' },
        { key: 'B', label: 'q6_b', emoji: '📞', value: 'q6_b' },
        { key: 'C', label: 'q6_c', emoji: '🔍', value: 'q6_c' },
        { key: 'D', label: 'q6_d', emoji: '✍️', value: 'q6_d' },
        { key: 'E', label: 'q6_e', emoji: '💼', value: 'q6_e' },
        { key: 'F', label: 'q6_f', emoji: '📷', value: 'q6_f' }
      ]
    },
    { // Q7
      num: 7, type: 'single', name: 'region', cols: 'three-col',
      title: 'q7_title', sub: 'q7_sub',
      options: [
        { key: 'A', label: 'q7_a', emoji: '🏘️', value: 'q7_a' },
        { key: 'B', label: 'q7_b', emoji: '🇩🇪', value: 'q7_b' },
        { key: 'C', label: 'q7_c', emoji: '🇦🇹', value: 'q7_c' },
        { key: 'D', label: 'q7_d', emoji: '🇨🇭', value: 'q7_d' },
        { key: 'E', label: 'q7_e', emoji: '🌍', value: 'q7_e' }
      ]
    },
    { num: 8, type: 'text', name: 'wichtig', title: 'q8_title', sub: 'q8_sub' },
    { // Q9
      num: 9, type: 'single', name: 'wunsch_anfragen', cols: 'three-col',
      title: 'q9_title', sub: 'q9_sub',
      options: [
        { key: 'A', label: null, text: '2 – 5', emoji: '🌱', value: '2-5' },
        { key: 'B', label: null, text: '5 – 10', emoji: '🌿', value: '5-10' },
        { key: 'C', label: null, text: '10 – 20', emoji: '🌲', value: '10-20' },
        { key: 'D', label: null, text: '20 – 50', emoji: '🎯', value: '20-50' },
        { key: 'E', label: null, text: '50 – 100', emoji: '🚀', value: '50-100' },
        { key: 'F', label: 'over_100', emoji: '💥', value: 'über 100' }
      ]
    },
    { num: 10, type: 'email', name: 'email', title: 'q10_title', sub: 'q10_sub' },
    { num: 11, type: 'contact', name: 'contact', title: 'q11_title', sub: 'q11_sub' }
  ];

  // ============ RENDER ============
  function getOptionDisplayText(opt) {
    if (opt.text) return opt.text; // static text like "5 – 10"
    if (opt.label) return t(opt.label);
    return '';
  }

  function getOptionStoredText(opt) {
    // For email: use translated label for display, but store both lang + de
    if (opt.label) return t(opt.label);
    if (opt.text) return opt.text;
    return opt.value;
  }

  function renderCurrentSlide() {
    if (currentSlide === 0) renderIntro();
    else if (currentSlide > TOTAL) renderResult();
    else renderQuestion(questions[currentSlide - 1]);
  }

  function renderIntro() {
    container.innerHTML =
      '<div class="slide active" id="slideIntro"><div class="intro-screen">' +
      '<div class="intro-icon">🚀</div>' +
      '<h1>' + t('intro_title_1') + '<span>' + t('intro_title_2') + '</span></h1>' +
      '<p>' + t('intro_desc') + '</p>' +
      '<div class="intro-badges">' +
        '<div class="intro-badge"><svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg> ' + t('badge_time') + '</div>' +
        '<div class="intro-badge"><svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg> ' + t('badge_free') + '</div>' +
        '<div class="intro-badge"><svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg> ' + t('badge_safe') + '</div>' +
      '</div>' +
      '<button class="btn btn-primary btn-start" onclick="startQuiz()">' + t('quiz_start') + ' ' + ICON_ARROW_R + '</button>' +
      '</div></div>';
  }

  function renderQuestion(q) {
    var html = '<div class="slide active">';
    html += '<div class="question-number">' + q.num + '</div>';
    html += '<h2 class="question-text">' + t(q.title) + '</h2>';

    if (q.type === 'multi') {
      html += '<div class="multi-hint">' + ICON_INFO + ' ' + t('multi_hint') + '</div>';
    } else if (q.sub) {
      html += '<p class="question-sub">' + t(q.sub) + '</p>';
    }

    if (q.type === 'single' || q.type === 'multi') {
      html += '<div class="options-grid ' + (q.cols || '') + '" data-name="' + q.name + '"' + (q.type === 'multi' ? ' data-multi="true"' : '') + '>';
      q.options.forEach(function(opt) {
        var selected = false;
        if (q.type === 'single') {
          selected = answers[q.name] === opt.value;
        } else {
          selected = answers[q.name] && answers[q.name].indexOf(opt.value) !== -1;
        }
        html += '<div class="option-card' + (selected ? ' selected' : '') + '" data-value="' + opt.value + '" onclick="' + (q.type === 'single' ? 'selectSingle' : 'selectMulti') + '(this)">';
        html += '<div class="option-img-placeholder">' + opt.emoji + '</div>';
        html += '<div class="option-body"><span class="option-key">' + opt.key + '</span>';
        html += '<span class="option-label">' + getOptionDisplayText(opt) + '</span></div></div>';
      });
      html += '</div>';
    }

    if (q.type === 'text') {
      html += '<div class="input-group">';
      html += '<textarea class="input-field" id="freitext" placeholder="' + t('q8_placeholder') + '" oninput="validateText()">' + (answers.wichtig || '') + '</textarea>';
      html += '</div>';
    }

    if (q.type === 'email') {
      html += '<div class="input-group"><label for="email">' + t('q10_email_label') + '</label>';
      html += '<input type="email" class="input-field" id="email" placeholder="deine@email.de" value="' + (answers.email || '') + '" oninput="validateEmail()" autocomplete="email">';
      html += '<div class="input-error" id="emailError">' + t('q10_email_error') + '</div></div>';
    }

    if (q.type === 'contact') {
      html += '<div class="input-group"><label for="vorname">' + t('q11_name_label') + '</label>';
      html += '<input type="text" class="input-field" id="vorname" placeholder="Max" value="' + (answers.vorname || '') + '" oninput="validateContact()" autocomplete="given-name"></div>';
      html += '<div class="input-group"><label for="telefon">' + t('q11_phone_label') + '</label>';
      html += '<input type="tel" class="input-field" id="telefon" placeholder="+49 170 1234567" value="' + (answers.telefon || '') + '" oninput="validateContact()" autocomplete="tel">';
      html += '<div class="input-error" id="telError">' + t('q11_phone_error') + '</div></div>';
    }

    // Nav row
    html += '<div class="nav-row">';
    html += '<button class="btn btn-back" onclick="goBack()">' + ICON_ARROW_L + ' ' + t('zurueck') + '</button>';
    if (q.num === TOTAL) {
      var contactValid = answers.vorname && answers.vorname.length >= 2 && answers.telefon && /[\d]{6,}/.test(answers.telefon.replace(/[\s\-\+\(\)]/g, ''));
      html += '<button class="btn btn-submit" id="submitBtn" ' + (contactValid ? '' : 'disabled') + ' onclick="submitQuiz()">' + t('submit_btn') + ' ' + ICON_CHECK + '</button>';
    } else {
      var enabled = isStepValid(q);
      html += '<button class="btn btn-primary" id="nextBtn" ' + (enabled ? '' : 'disabled') + ' onclick="goNext()">' + t('weiter') + ' ' + ICON_ARROW_R + '</button>';
    }
    html += '</div></div>';

    container.innerHTML = html;
    // Focus first input on text/email/contact slides
    if (q.type === 'text') { var ta = document.getElementById('freitext'); if (ta) ta.focus(); }
    if (q.type === 'email') { var em = document.getElementById('email'); if (em && !answers.email) em.focus(); }
    if (q.type === 'contact') { var vn = document.getElementById('vorname'); if (vn && !answers.vorname) vn.focus(); }
  }

  function isStepValid(q) {
    if (q.type === 'single') return !!answers[q.name];
    if (q.type === 'multi') return answers[q.name] && answers[q.name].length > 0;
    if (q.type === 'text') return answers.wichtig && answers.wichtig.length >= 3;
    if (q.type === 'email') return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(answers.email || '');
    if (q.type === 'contact') {
      return answers.vorname && answers.vorname.length >= 2 &&
             answers.telefon && /[\d]{6,}/.test((answers.telefon || '').replace(/[\s\-\+\(\)]/g, ''));
    }
    return false;
  }

  function renderResult() {
    container.innerHTML =
      '<div class="slide active"><div class="result-screen">' +
      '<div class="result-check"><svg fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><path d="M5 13l4 4L19 7"/></svg></div>' +
      '<h2>' + t('result_title') + '</h2>' +
      '<p class="result-sub">' + t('result_sub') + '</p>' +
      '<div class="result-cta"><p>' + t('result_cta_title') + '</p><span class="sub">' + t('result_cta_sub') + '</span></div>' +
      '<div class="testimonials-heading">' + t('testimonials_heading') + '</div>' +
      '<div class="testimonials">' +
        testimonialHTML('Marco K.', t('q1_a'), '"Seit der Zusammenarbeit erhalten wir jede Woche 15+ qualifizierte Anfragen. Vorher waren es vielleicht 2-3 im Monat."') +
        testimonialHTML('Sarah M.', 'Business Coach', '"Die Leads sind deutlich qualifizierter als alles, was wir vorher über Facebook Ads bekommen haben."') +
        testimonialHTML('Thomas R.', 'IT-Dienstleister', '"Endlich eine Leadquelle, die planbar und skalierbar funktioniert. Unser Umsatz hat sich verdoppelt."') +
        testimonialHTML('Lisa W.', t('q1_b'), '"Wir mussten sogar neue Mitarbeiter einstellen, weil so viele Anfragen reinkamen."') +
      '</div></div></div>';
  }

  function testimonialHTML(name, role, text) {
    return '<div class="testimonial"><div class="testimonial-stars">★★★★★</div>' +
      '<p class="testimonial-text">' + text + '</p>' +
      '<div class="testimonial-author">' + name + '</div>' +
      '<div class="testimonial-role">' + role + '</div></div>';
  }

  // ============ NAVIGATION ============
  function updateProgress() {
    var counter = document.getElementById('stepCounter');
    var fill = document.getElementById('progressFill');
    if (currentSlide === 0 || currentSlide > TOTAL) {
      counter.textContent = '';
      fill.style.width = currentSlide > TOTAL ? '100%' : '0%';
    } else {
      counter.textContent = currentSlide + ' / ' + TOTAL;
      fill.style.width = ((currentSlide / TOTAL) * 100) + '%';
    }
  }

  function showSlide(idx) {
    currentSlide = idx;
    renderCurrentSlide();
    updateProgress();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  window.startQuiz = function() { showSlide(1); };
  window.goNext = function() { if (currentSlide < TOTAL) showSlide(currentSlide + 1); };
  window.goBack = function() { if (currentSlide > 0) showSlide(currentSlide - 1); };

  window.selectSingle = function(card) {
    var grid = card.closest('.options-grid');
    var name = grid.getAttribute('data-name');
    grid.querySelectorAll('.option-card').forEach(function(c) { c.classList.remove('selected'); });
    card.classList.add('selected');
    answers[name] = card.getAttribute('data-value');
    var btn = document.getElementById('nextBtn');
    if (btn) btn.disabled = false;
    setTimeout(function() { if (currentSlide < TOTAL) window.goNext(); }, 400);
  };

  window.selectMulti = function(card) {
    card.classList.toggle('selected');
    var grid = card.closest('.options-grid');
    var name = grid.getAttribute('data-name');
    var sel = grid.querySelectorAll('.option-card.selected');
    answers[name] = Array.from(sel).map(function(c) { return c.getAttribute('data-value'); });
    var btn = document.getElementById('nextBtn');
    if (btn) btn.disabled = sel.length === 0;
  };

  window.validateText = function() {
    var val = document.getElementById('freitext').value.trim();
    answers.wichtig = val;
    var btn = document.getElementById('nextBtn');
    if (btn) btn.disabled = val.length < 3;
  };

  window.validateEmail = function() {
    var val = document.getElementById('email').value.trim();
    var valid = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(val);
    var err = document.getElementById('emailError');
    if (val.length > 0 && !valid) err.classList.add('show'); else err.classList.remove('show');
    answers.email = val;
    var btn = document.getElementById('nextBtn');
    if (btn) btn.disabled = !valid;
  };

  window.validateContact = function() {
    var vorname = document.getElementById('vorname').value.trim();
    var telefon = document.getElementById('telefon').value.trim();
    var phoneClean = telefon.replace(/[\s\-\+\(\)]/g, '');
    var phoneValid = /[\d]{6,}/.test(phoneClean);
    var err = document.getElementById('telError');
    if (telefon.length > 0 && !phoneValid) err.classList.add('show'); else err.classList.remove('show');
    answers.vorname = vorname;
    answers.telefon = telefon;
    var btn = document.getElementById('submitBtn');
    if (btn) btn.disabled = !(vorname.length >= 2 && phoneValid);
  };

  // ============ SUBMIT ============
  // Helper: resolve a stored answer value to display text in a given language
  function resolveValue(val, lang) {
    // If val matches a translation key, translate it
    if (T[val]) return (T[val][lang] || T[val]['de'] || val);
    return val;
  }

  function resolveArray(arr, lang) {
    if (!arr || !Array.isArray(arr)) return '-';
    return arr.map(function(v) { return resolveValue(v, lang); }).join(', ');
  }

  window.submitQuiz = function() {
    var btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> ' + t('sending');

    // Build bilingual email body
    var langInfo = LANGS.find(function(l) { return l.code === currentLang; }) || LANGS[0];
    var body = '';

    // If not German, show user's language first, then German
    if (currentLang !== 'de') {
      body += '=== ' + langInfo.label + ' ===\n\n';
      body += buildEmailBody(currentLang);
      body += '\n\n=== Deutsch ===\n\n';
      body += buildEmailBody('de');
    } else {
      body += buildEmailBody('de');
    }

    body += '\n---\nSprache / Language: ' + langInfo.flag + ' ' + langInfo.label + ' (' + currentLang + ')\n';

    // LocalStorage backup
    var submissions = JSON.parse(localStorage.getItem('quiz_submissions') || '[]');
    submissions.push({ timestamp: new Date().toISOString(), lang: currentLang, answers: Object.assign({}, answers) });
    localStorage.setItem('quiz_submissions', JSON.stringify(submissions));

    // mailto
    var subject = encodeURIComponent('Neuer Lead-Quiz Eintrag: ' + (answers.vorname || 'Unbekannt') + ' [' + langInfo.label + ']');
    var mailBody = encodeURIComponent(body);
    var link = document.createElement('a');
    link.href = 'mailto:info@claude.dzeksn.com?subject=' + subject + '&body=' + mailBody;
    link.style.display = 'none';
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);

    setTimeout(function() { showSlide(TOTAL + 1); }, 800);
  };

  function buildEmailBody(lang) {
    var lbl = function(key) { return T['email_label_' + key] ? (T['email_label_' + key][lang] || T['email_label_' + key]['de']) : key; };
    var b = '';
    b += lbl('bereich') + ': ' + resolveValue(answers.bereich || '-', lang) + '\n';
    b += lbl('herausforderungen') + ': ' + resolveArray(answers.herausforderungen, lang) + '\n';
    b += lbl('anfragen') + ': ' + resolveValue(answers.anfragen_monat || '-', lang) + '\n';
    b += lbl('preis') + ': ' + resolveValue(answers.angebotspreis || '-', lang) + '\n';
    b += lbl('kapazitaet') + ': ' + resolveValue(answers.kapazitaet || '-', lang) + '\n';
    b += lbl('leadquellen') + ': ' + resolveArray(answers.leadquellen, lang) + '\n';
    b += lbl('region') + ': ' + resolveValue(answers.region || '-', lang) + '\n';
    b += lbl('wichtig') + ': ' + (answers.wichtig || '-') + '\n';
    b += lbl('wunsch') + ': ' + resolveValue(answers.wunsch_anfragen || '-', lang) + '\n';
    b += 'E-Mail: ' + (answers.email || '-') + '\n';
    b += (T['q11_name_label'][lang] || 'Vorname') + ' ' + (answers.vorname || '-') + '\n';
    b += 'WhatsApp: ' + (answers.telefon || '-') + '\n';
    return b;
  }

  // ============ KEYBOARD ============
  document.addEventListener('keydown', function(e) {
    if (currentSlide === 0 || currentSlide > TOTAL) return;
    var cards = container.querySelectorAll('.option-card');
    if (!cards.length) return;
    var keyMap = 'abcdefghij';
    var idx = keyMap.indexOf(e.key.toLowerCase());
    if (idx >= 0 && idx < cards.length) cards[idx].click();
    if (e.key === 'Enter') {
      var btn = container.querySelector('.btn-primary, .btn-submit');
      if (btn && !btn.disabled) btn.click();
    }
  });

  // ============ INIT ============
  buildLangDropdown();
  renderCurrentSlide();
  updateProgress();

})();
</script>
